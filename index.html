<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Tela de Login</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container d-flex justify-content-center align-items-center vh-100">
        
        <div class="card shadow p-4 login-box">

            <h3 class="text-center mb-4">Login</h3>

            <form id="formLogin">
                
  
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" id="email" class="form-control" placeholder="Digite seu email">
                </div>


                <div class="mb-3">
                    <label class="form-label">Senha</label>
                    <input type="password" id="senha" class="form-control" placeholder="Digite sua senha">
                </div>


                <div class="form-check mb-3">
                    <input class="form-check-input" type="checkbox" id="lembrar">
                    <label class="form-check-label">Lembrar de mim</label>
                </div>

                <!-- Botão -->
                <button type="submit" class="btn btn-primary w-100">
                    Entrar
                </button>


                <div id="mensagem" class="mt-3 text-center"></div>

            </form>

        </div>

    </div>

   
    <script src="script.js"></script>

</body>
</html>
